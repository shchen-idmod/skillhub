services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: change-me-in-production
      DATABASE_URL: sqlite+aiosqlite:////data/skillhub.db
      UPLOAD_DIR: /data/uploads
    volumes:
      - ./backend:/app      # code — hot-reload
      - ./data:/data        # database + uploads — visible on host
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
